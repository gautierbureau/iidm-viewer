name: Release

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            iidm_viewer/frontend/nad_component/package-lock.json
            iidm_viewer/frontend/sld_component/package-lock.json
            iidm_viewer/frontend/map_component/package-lock.json

      - name: Build NAD component bundle
        working-directory: iidm_viewer/frontend/nad_component
        run: |
          npm ci
          npm run build

      - name: Build SLD component bundle
        working-directory: iidm_viewer/frontend/sld_component
        run: |
          npm ci
          npm run build

      - name: Build Map component bundle
        working-directory: iidm_viewer/frontend/map_component
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload to GitHub Release
        uses: actions/upload-artifact@v4
        with:
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
